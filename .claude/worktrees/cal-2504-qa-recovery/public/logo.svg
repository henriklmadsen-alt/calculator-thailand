<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Calculator icon -->
  <rect x="4" y="4" width="52" height="52" rx="12" fill="url(#iconGrad)"/>
  <!-- Display bar -->
  <rect x="12" y="12" width="36" height="14" rx="4" fill="white" opacity="0.95"/>
  <!-- Button row 1 -->
  <rect x="12" y="31" width="9" height="9" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="24" y="31" width="9" height="9" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="36" y="31" width="9" height="9" rx="2.5" fill="white" opacity="0.9"/>
  <!-- Button row 2 -->
  <rect x="12" y="43" width="9" height="9" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="24" y="43" width="9" height="9" rx="2.5" fill="white" opacity="0.9"/>
  <!-- Wide button (=) -->
  <rect x="36" y="43" width="9" height="9" rx="2.5" fill="#93c5fd" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="70" y="26" font-family="'Noto Sans Thai', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#1e3a8a" letter-spacing="-0.5">kamnuanlek</text>
  <text x="70" y="46" font-family="'Noto Sans Thai', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="13" fill="#2563eb" letter-spacing="0.5">คำนวณเลข · เครื่องคำนวณไทย</text>
</svg>
